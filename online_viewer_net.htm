<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BTO Beamer Bediening</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background: radial-gradient(circle, #3d3d3d 0%, #1a1a1a 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #pincode-scherm {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-container {
            background: white;
            padding: 15px 30px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            width: 340px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
        }

        .logo {
            max-width: 180px;
            height: auto;
        }


        .container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            text-align: center;
            width: 340px;
            box-sizing: border-box;
        }

        h3 {
            font-weight: 400;
            margin: 0 0 20px 0;
            letter-spacing: 2px;
            color: #bbb;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        #display {
            font-size: 2.5rem;
            height: 50px;
            margin-bottom: 25px;
            letter-spacing: 15px;
            color: #fff;
            border-bottom: 2px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            justify-items: center;
        }

        button {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:active {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0.9);
        }

        .clear {
            background: rgba(211, 47, 47, 0.3);
            font-size: 1.4rem;
            color: #ff9999;
        }

        #error {
            color: #ff5252;
            margin-top: 15px;
            font-size: 0.8rem;
            font-weight: 600;
            min-height: 20px;
        }

        #instructie-scherm {
            display: none;
            flex-direction: column;
            align-items: center;
            color: white;
            text-align: center;
            max-width: 340px;
        }

        .pincode-badge {
            background: #fff;
            color: #333;
            padding: 10px 25px;
            border-radius: 10px;
            font-size: 2.2rem;
            font-weight: bold;
            margin: 20px 0;
            letter-spacing: 5px;
        }

        .shake {
            animation: shake 0.4s;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-10px);
            }

            75% {
                transform: translateX(10px);
            }
        }
    </style>
</head>

<body>

    <div id="pincode-scherm">
        <div class="logo-container">
            <img src="https://btobarneveld.nl/build/assets/logo.319cd110.svg" alt="BTO Logo" class="logo">
        </div>

        <div class="container" id="main-card">
            <h3>Toegangscode</h3>
            <div id="display"></div>
            <div class="numpad">
                <button onclick="addNumber('1')">1</button>
                <button onclick="addNumber('2')">2</button>
                <button onclick="addNumber('3')">3</button>
                <button onclick="addNumber('4')">4</button>
                <button onclick="addNumber('5')">5</button>
                <button onclick="addNumber('6')">6</button>
                <button onclick="addNumber('7')">7</button>
                <button onclick="addNumber('8')">8</button>
                <button onclick="addNumber('9')">9</button>
                <div style="width: 70px;"></div>
                <button onclick="addNumber('0')">0</button>
                <button class="clear" onclick="clearDisplay()">C</button>
            </div>
            <div id="error"></div>
        </div>

        <div id="instructie-scherm" class="container">
            <h3 style="color: #fff;">Belangrijk</h3>
            <p>Voer in het volgende scherm als pincode in:</p>
            <div class="pincode-badge">2019</div>
            <p style="font-size: 0.8rem; color: #ccc;">U wordt nu doorgeleid...</p>
        </div>
    </div>

    <script>
        let codeInvoer = "";
        const CONFIG = {
            CODE: "3771",
            URL: "http://10.170.28.142",
            TIMEOUT: 30000
        };

        let idleTimer;

        function startIdleTimer() {
            clearTimeout(idleTimer);
            idleTimer = setTimeout(clearDisplay, CONFIG.TIMEOUT);
        }

        function addNumber(num) {
            startIdleTimer();
            document.getElementById('error').innerText = "";
            if (codeInvoer.length < 4) {
                codeInvoer += num;
                updateDisplay();
                if (codeInvoer.length === 4) {
                    setTimeout(checkCode, 300);
                }
            }
        }

        function updateDisplay() {
            // Nu met sterretjes (*)
            document.getElementById('display').innerText = "*".repeat(codeInvoer.length);
        }

        function clearDisplay() {
            codeInvoer = "";
            updateDisplay();
            document.getElementById('error').innerText = "";
        }

        function checkCode() {
            if (codeInvoer === CONFIG.CODE) {
                document.getElementById('main-card').style.display = 'none';
                document.getElementById('instructie-scherm').style.display = 'block';

                setTimeout(() => {
                    window.location.href = CONFIG.URL;
                }, 4000);
            } else {
                const card = document.getElementById('main-card');
                document.getElementById('error').innerText = "Code onjuist";
                card.classList.add('shake');
                codeInvoer = "";
                setTimeout(() => {
                    updateDisplay();
                    card.classList.remove('shake');
                }, 400);
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') addNumber(e.key);
            if (e.key === 'Escape' || e.key === 'Backspace') clearDisplay();
        });

        startIdleTimer();
    </script>

</body>

</html>
